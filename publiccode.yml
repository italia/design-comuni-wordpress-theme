description:
  it-IT:
    shortDescription: Tema WordPress per realizzare e gestire siti web comunali
      basati sul Modello Comuni di Designers Italia.
    longDescription: Il tema WordPress del Modello Comuni è una soluzione pronta
      all'uso per il content management system (CMS) WordPress per realizzare e
      gestire i siti web dei Comuni. Basato sul modello di sito istituzionale
      dei Comuni italiani di Designers Italia, consente di adottare rapidamente
      una struttura informativa coerente e di gestire i contenuti tramite il CMS
      WordPress. Il tema definisce automaticamente l'organizzazione del sito, i
      layout delle pagine e la navigazione, permettendo di concentrarsi sulla
      creazione e gestione dei contenuti. Supporta inoltre diverse tipologie di
      contenuto, come uffici, servizi, notizie e informazioni
      sull'organizzazione comunale, facilitando la pubblicazione e
      l'aggiornamento delle informazioni.
    documentation: https://github.com/italia/design-comuni-wordpress-theme/blob/main/README.md
    features:
      - Tema WordPress pronto all'uso per i siti web dei Comuni
      - Permette di creare, aggiornare e organizzare i contenuti tramite CMS
      - Struttura automaticamente navigazione e pagine sulla base del Modello
        Comuni di Designers Italia
      - Supporta tipologie di contenuto dedicate
      - Consente la gestione dei contenuti da parte degli editor senza
        interventi tecnici
